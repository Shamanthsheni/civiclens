<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CivicLens logo">
  <title>CivicLens</title>

  <!-- Magnifying glass circle -->
  <circle cx="26" cy="26" r="19" fill="none" stroke="#1E3A5F" stroke-width="5"/>

  <!-- Government building inside the circle -->
  <!-- Roof / pediment -->
  <polygon points="16,22 26,14 36,22" fill="#1E3A5F"/>
  <!-- Pillars (3) -->
  <rect x="17" y="22" width="3.5" height="9" rx="0.5" fill="#1E3A5F"/>
  <rect x="24.25" y="22" width="3.5" height="9" rx="0.5" fill="#1E3A5F"/>
  <rect x="31.5" y="22" width="3.5" height="9" rx="0.5" fill="#1E3A5F"/>
  <!-- Base step -->
  <rect x="15" y="31" width="22" height="3" rx="0.5" fill="#1E3A5F"/>

  <!-- Magnifying glass handle -->
  <line x1="40" y1="40" x2="52" y2="52" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round"/>

  <!-- Green checkmark badge (bottom-right of glass circle) -->
  <circle cx="41" cy="39" r="9" fill="#16a34a"/>
  <polyline points="36.5,39 39.5,42.5 45.5,36" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
